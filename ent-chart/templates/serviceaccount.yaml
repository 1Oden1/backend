# ============================================================
#  ServiceAccount + RBAC — ENT Salé
#  Permissions minimales pour les microservices
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ent-service-account
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}

---
# Role : lecture des ConfigMaps et Secrets dans le namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ent-microservice-role
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ent-microservice-rolebinding
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: ent-service-account
    namespace: {{ include "ent.namespace" . }}
roleRef:
  kind: Role
  name: ent-microservice-role
  apiGroup: rbac.authorization.k8s.io

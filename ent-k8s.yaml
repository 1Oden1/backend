# ════════════════════════════════════════════════════════════════
#  HPA — Autoscaling CPU
# ════════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-ms-auth
  namespace: ent-sale
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-auth
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70


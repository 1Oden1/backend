# ── ms-ia (CPU intensif, scale plus lent) ─────────────────
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-ms-ia
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: ms-ia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-ia
  minReplicas: {{ .Values.microservices.msIa.hpa.minReplicas | default 1 }}
  maxReplicas: {{ .Values.microservices.msIa.hpa.maxReplicas | default 4 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.microservices.msIa.hpa.targetCPUUtilizationPercentage | default 80 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # IA = démarrage lent, ne pas scaler trop vite
      policies:
        - type: Pods
          value: 1
          periodSeconds: 90
    scaleDown:
      stabilizationWindowSeconds: 600  # Garder les replicas en vie (cold start coûteux)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300


# ==============================================================
#  ms-calendar (port 8004)
# ==============================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-calendar
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: ms-calendar
    app.kubernetes.io/component: microservice
spec:
  replicas: {{ .Values.microservices.defaults.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ms-calendar
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ms-calendar
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z $(MYSQL_HOST) 3306; do echo waiting...; sleep 3; done"]
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MYSQL_HOST
      containers:
        - name: ms-calendar
          image: {{ include "ent.image" (dict "global" .Values.global "image" .Values.microservices.msCalendar.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- include "ent.commonEnv" . | nindent 12 }}
            {{- include "ent.mysqlEnv" . | nindent 12 }}
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MYSQL_DB_CALENDAR
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.microservices.defaults.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-calendar
  namespace: {{ include "ent.namespace" . }}
spec:
  selector:
    app.kubernetes.io/name: ms-calendar
  ports:
    - port: 8000
      targetPort: 8000
      name: http


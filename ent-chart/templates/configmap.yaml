apiVersion: v1
kind: ConfigMap
metadata:
  name: ent-config
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
data:
  # Keycloak
  KEYCLOAK_URL: {{ include "ent.keycloakURL" . | quote }}
  KEYCLOAK_REALM: "ent-sale"
  KEYCLOAK_CLIENT_ID: "ent-backend"
  JWT_ALGORITHM: "RS256"

  # MySQL
  MYSQL_HOST: {{ include "ent.mysqlHost" . | quote }}
  MYSQL_PORT: "3306"
  MYSQL_DB_CALENDAR: "ent_calendar"
  MYSQL_DB_NOTES: "ent_notes"

  # Cassandra
  CASSANDRA_HOST: {{ include "ent.cassandraHost" . | quote }}
  CASSANDRA_KEYSPACE_FILES: "ent_files"
  CASSANDRA_KEYSPACE_MESSAGING: "ent_messaging"
  CASSANDRA_DC: "datacenter1"

  # MinIO
  MINIO_ENDPOINT: {{ include "ent.minioEndpoint" . | quote }}
  MINIO_ENDPOINT_PUBLIC: {{ printf "%s:9000" .Values.global.domain | quote }}
  MINIO_BUCKET: "ent-courses"

  # RabbitMQ
  RABBITMQ_HOST: {{ printf "%s-rabbitmq" .Release.Name | quote }}
  RABBITMQ_EXCHANGE: "ent.events"
  RABBITMQ_QUEUE: "ms_messaging_queue"

  # Ollama / IA
  OLLAMA_HOST: {{ include "ent.ollamaURL" . | quote }}
  OLLAMA_URL: {{ include "ent.ollamaURL" . | quote }}
  OLLAMA_MODEL: {{ .Values.ollama.model | quote }}
  MAX_HISTORY_MESSAGES: "20"
  MAX_PROMPT_CHARS: "4000"

  # ms-upload
  MAX_FILE_SIZE_MB: "50"

  # URLs inter-services
  MS_CALENDAR_URL: "http://ms-calendar:8000"
  MS_MESSAGING_URL: "http://ms-messaging:8000"
  MS_NOTES_URL: "http://ms-notes:8000"
  MS_AUTH_URL: "http://ms-auth:8000"

---
# ConfigMap pour le script SQL d'initialisation MySQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
data:
  init.sql: |
    -- Bases de données ENT Salé
    CREATE DATABASE IF NOT EXISTS keycloak CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS ent_calendar CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS ent_notes CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS ent_admin CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    GRANT ALL PRIVILEGES ON keycloak.* TO 'ent_user'@'%';
    GRANT ALL PRIVILEGES ON ent_calendar.* TO 'ent_user'@'%';
    GRANT ALL PRIVILEGES ON ent_notes.* TO 'ent_user'@'%';
    GRANT ALL PRIVILEGES ON ent_admin.* TO 'ent_user'@'%';
    FLUSH PRIVILEGES;

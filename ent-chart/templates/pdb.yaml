# ============================================================
#  PodDisruptionBudgets — garantit la haute disponibilité
#  lors des maintenances (drain de nœud, mise à jour k8s)
# ============================================================

{{- $services := list "ms-auth" "ms-upload" "ms-download" "ms-calendar" "ms-notes" "ms-messaging" "ms-ia" }}
{{- range $services }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-{{ . }}
  namespace: {{ include "ent.namespace" $ }}
  labels:
    {{- include "ent.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ . }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ . }}
{{- end }}

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-frontend
  namespace: {{ include "ent.namespace" . }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend

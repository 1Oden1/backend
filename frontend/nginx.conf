server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript text/html application/json;
    gzip_min_length 1024;

    # ── Sécurité ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Proxy settings communs ─────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_pass_header Authorization;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;

    # ── Fichiers statiques ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── MS-AUTH  →  ent_ms_auth:8000  (réseau : ms-auth_default) ──
    location /api/auth/ {
        proxy_pass http://ent_ms_auth:8000/auth/;

        # CORS pre-flight
        add_header Access-Control-Allow-Origin      "$http_origin" always;
        add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── MS-UPLOAD  →  ent_ms_upload:8000  (réseau : ms-auth_default) ──
    location /api/upload/ {
        proxy_pass           http://ent_ms_upload:8000/;
        client_max_body_size 60M;
        proxy_read_timeout   60s;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── MS-DOWNLOAD  →  ent_ms_download:8000  (réseau : ms-auth_default) ──
    location /api/download/ {
        proxy_pass         http://ent_ms_download:8000/;
        proxy_read_timeout 60s;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── MS-CALENDAR  →  ent_ms_calendar:8000  (réseau : ms-auth_default) ──
    location /api/calendar/ {
        proxy_pass http://ent_ms_calendar:8000/;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── MS-NOTES  →  ent_ms_notes:8000  (réseau : ms-auth_default) ──
    location /api/notes/ {
        proxy_pass http://ent_ms_notes:8000/;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── MS-ADMIN  →  ent_ms_admin:8000  (réseau : ms-auth_default) ──
    location /api/admin/ {
        proxy_pass http://ent_ms_admin:8000/;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── MS-MESSAGING  →  ent_ms_messaging:8000  (réseau : ms-auth_default) ──
    location /api/messaging/ {
        proxy_pass         http://ent_ms_messaging:8000/;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Health check ───────────────────────────────────────────────
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
}

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;

        # ── Pages ──────────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ $uri/index.html /login/index.html;
        }

        # ── Health frontend ────────────────────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","service":"frontend"}';
            add_header Content-Type application/json;
        }

        # ── MS-Auth : /api/auth/* → ent_ms_auth:8000/auth/* ───────────────
        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass http://ent_ms_auth:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Authorization     $http_authorization;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-Upload : /api/upload/* → ent_ms_upload:8000/api/v1/upload/* ─
        location /api/upload/ {
            rewrite ^/api/upload/(.*)$ /api/v1/upload/$1 break;
            proxy_pass http://ent_ms_upload:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Authorization   $http_authorization;
            client_max_body_size 100M;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-Download : /api/download/* → ent_ms_download:8000/api/v1/download/* ─
        location /api/download/ {
            rewrite ^/api/download/(.*)$ /api/v1/download/$1 break;
            proxy_pass http://ent_ms_download:8000;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-Calendar : /api/calendar/* → ent_ms_calendar:8000/api/v1/calendar/* ─
        location /api/calendar/ {
            rewrite ^/api/calendar/(.*)$ /api/v1/calendar/$1 break;
            proxy_pass http://ent_ms_calendar:8000;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-Notes : /api/notes/* → ent_ms_notes:8000/api/v1/notes/* ───
        location /api/notes/ {
            rewrite ^/api/notes/(.*)$ /api/v1/notes/$1 break;
            proxy_pass http://ent_ms_notes:8000;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-Admin : /api/admin/* → ent_ms_admin:8000/api/v1/admin/* ───
        location /api/admin/ {
            rewrite ^/api/admin/(.*)$ /api/v1/admin/$1 break;
            proxy_pass http://ent_ms_admin:8000;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-Messaging : /api/messaging/* → ent_ms_messaging:8000/api/v1/messaging/* ─
        location /api/messaging/ {
            rewrite ^/api/messaging/(.*)$ /api/v1/messaging/$1 break;
            proxy_pass http://ent_ms_messaging:8000;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── MS-IA : /api/ia/* → ent_ms_ia:8000/api/v1/ia/* ──────────────
        # Note : le streaming SSE nécessite de désactiver le buffering Nginx.
        location /api/ia/ {
            rewrite ^/api/ia/(.*)$ /api/v1/ia/$1 break;
            proxy_pass http://ent_ms_ia:8000;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;

            # ── SSE / streaming ──
            proxy_buffering          off;       # désactiver le buffering (critique pour SSE)
            proxy_cache              off;
            proxy_read_timeout       300s;      # laisser le temps au LLM de générer
            proxy_connect_timeout    10s;
            chunked_transfer_encoding on;

            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            add_header Cache-Control  "no-cache";
            add_header X-Accel-Buffering "no";  # signal au client de ne pas buffériser
            if ($request_method = OPTIONS) { return 204; }
        }
    }
}

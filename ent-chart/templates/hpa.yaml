# ============================================================
#  HPA — Horizontal Pod Autoscalers
#  Scaling automatique basé sur CPU + Mémoire
#  Nécessite : metrics-server installé dans le cluster
# ============================================================

# ── ms-auth ────────────────────────────────────────────────
{{- if .Values.microservices.defaults.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-ms-auth
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: ms-auth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-auth
  minReplicas: {{ .Values.microservices.defaults.hpa.minReplicas }}
  maxReplicas: {{ .Values.microservices.msAuth.hpa.maxReplicas | default .Values.microservices.defaults.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.microservices.defaults.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.microservices.defaults.hpa.targetMemoryUtilizationPercentage }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120


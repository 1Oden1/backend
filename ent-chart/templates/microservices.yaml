# ============================================================
#  Microservices FastAPI — Deployments + Services
#  Chaque microservice hérite du ConfigMap + Secret global
# ============================================================

# ──────────────────────────────────────────────────────────────
#  Macro : env commun à tous les microservices
# ──────────────────────────────────────────────────────────────
{{- define "ent.commonEnv" -}}
# — Keycloak —
- name: KEYCLOAK_URL
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: KEYCLOAK_URL
- name: KEYCLOAK_REALM
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: KEYCLOAK_REALM
- name: KEYCLOAK_CLIENT_ID
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: KEYCLOAK_CLIENT_ID
- name: KEYCLOAK_CLIENT_SECRET
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: KEYCLOAK_CLIENT_SECRET
- name: JWT_ALGORITHM
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: JWT_ALGORITHM
{{- end }}

{{- define "ent.mysqlEnv" -}}
- name: MYSQL_HOST
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: MYSQL_HOST
- name: MYSQL_PORT
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: MYSQL_PORT
- name: MYSQL_USER
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: MYSQL_USER
- name: MYSQL_PASSWORD
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: MYSQL_PASSWORD
{{- end }}

{{- define "ent.cassandraEnv" -}}
- name: CASSANDRA_HOST
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: CASSANDRA_HOST
- name: CASSANDRA_DC
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: CASSANDRA_DC
{{- end }}

{{- define "ent.minioEnv" -}}
- name: MINIO_ENDPOINT
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: MINIO_ENDPOINT
- name: MINIO_ENDPOINT_PUBLIC
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: MINIO_ENDPOINT_PUBLIC
- name: MINIO_BUCKET
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: MINIO_BUCKET
- name: MINIO_ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: MINIO_ACCESS_KEY
- name: MINIO_SECRET_KEY
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: MINIO_SECRET_KEY
{{- end }}

{{- define "ent.rabbitmqEnv" -}}
- name: RABBITMQ_USER
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: RABBITMQ_USER
- name: RABBITMQ_PASSWORD
  valueFrom:
    secretKeyRef:
      name: ent-credentials
      key: RABBITMQ_PASSWORD
- name: RABBITMQ_URL
  value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@{{ printf "%s-rabbitmq" .Release.Name }}:5672/"
- name: RABBITMQ_EXCHANGE
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: RABBITMQ_EXCHANGE
- name: RABBITMQ_QUEUE
  valueFrom:
    configMapKeyRef:
      name: ent-config
      key: RABBITMQ_QUEUE
{{- end }}

# ==============================================================
#  ms-auth (port 8001)
# ==============================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-auth
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: ms-auth
    app.kubernetes.io/component: microservice
spec:
  replicas: {{ .Values.microservices.defaults.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ms-auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ms-auth
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ms-auth
          image: {{ include "ent.image" (dict "global" .Values.global "image" .Values.microservices.msAuth.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- include "ent.commonEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.microservices.defaults.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-auth
  namespace: {{ include "ent.namespace" . }}
spec:
  selector:
    app.kubernetes.io/name: ms-auth
  ports:
    - port: 8000
      targetPort: 8000
      name: http


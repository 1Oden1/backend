apiVersion: v2
name: ent-sale
description: Espace Numérique de Travail — EST Salé (Microservices + IA)
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ent
  - education
  - microservices
  - keycloak
  - fastapi
maintainers:
  - name: JTO
    email: jto@est-sale.ma
dependencies:
  - name: mysql
    version: "9.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mysql.enabled
  - name: cassandra
    version: "10.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: cassandra.enabled
  - name: rabbitmq
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
  - name: minio
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled

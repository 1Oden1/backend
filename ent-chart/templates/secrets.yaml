apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ent.secretName" . }}
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
type: Opaque
stringData:
  # MySQL
  MYSQL_ROOT_PASSWORD: {{ .Values.secrets.mysql.rootPassword | quote }}
  MYSQL_USER: {{ .Values.secrets.mysql.user | quote }}
  MYSQL_PASSWORD: {{ .Values.secrets.mysql.password | quote }}
  # Keycloak
  KEYCLOAK_ADMIN_USER: {{ .Values.secrets.keycloak.adminUser | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloak.adminPassword | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.keycloak.clientSecret | quote }}
  # MinIO
  MINIO_ACCESS_KEY: {{ .Values.secrets.minio.accessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minio.secretKey | quote }}
  # RabbitMQ
  RABBITMQ_USER: {{ .Values.secrets.rabbitmq.user | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secrets.rabbitmq.password | quote }}
  # Service-to-service token
  INTERNAL_SERVICE_TOKEN: {{ .Values.secrets.internalServiceToken | quote }}

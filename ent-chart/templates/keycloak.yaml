{{- if .Values.keycloak.enabled }}
# ============================================================
#  Keycloak — StatefulSet + Service
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
spec:
  serviceName: keycloak
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        # Attendre MySQL avant de démarrer Keycloak
        - name: wait-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "ent.mysqlHost" . }} 3306; do
                echo "En attente de MySQL..."; sleep 3
              done
              echo "MySQL prêt."
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          command: ["start-dev", "--import-realm"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ent.secretName" . }}
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ent.secretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: "mysql"
            - name: KC_DB_URL
              value: "jdbc:mysql://{{ include "ent.mysqlHost" . }}:3306/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "ent.secretName" . }}
                  key: MYSQL_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ent.secretName" . }}
                  key: MYSQL_PASSWORD
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
            optional: true   # créé séparément via kubectl create configmap

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
{{- end }}

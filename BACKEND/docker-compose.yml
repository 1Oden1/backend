services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - ent-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ent_messaging
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ent-network

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ent-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - ent-network

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SITE_URL: http://localhost:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ent-network

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    ports:
      - "8001:8001"
    env_file:
      - ./ms-auth/.env
    depends_on:
      - keycloak
    networks:
      - ent-network

  ms-messaging:
    build: ./ms-messaging
    container_name: ms-messaging
    ports:
      - "8002:8002"
    env_file:
      - ./ms-messaging/.env
    depends_on:
      - mysql
      - ms-auth
    networks:
      - ent-network

  ms-admin:
    build: ./ms-admin
    container_name: ms-admin
    ports:
      - "8006:8006"
    env_file:
      - ./ms-admin/.env
    depends_on:
      - keycloak
      - mysql
      - ms-auth
    networks:
      - ent-network

  ms-upload:
    build: ./ms-upload
    container_name: ms-upload
    ports:
      - "8004:8004"
    env_file:
      - ./ms-upload/.env
    depends_on:
      - mysql
      - ms-auth
      - minio
      - cassandra
    networks:
      - ent-network

  ms-download:
    build: ./ms-download
    container_name: ms-download
    ports:
      - "8005:8005"
    env_file:
      - ./ms-download/.env
    depends_on:
      - mysql
      - ms-auth
      - minio
      - cassandra
    networks:
      - ent-network

  ms-calendar:
    build: ./ms-calendar
    container_name: ms-calendar
    ports:
      - "8007:8007"
    env_file:
      - ./ms-calendar/.env
    depends_on:
      - mysql
      - ms-auth
    networks:
      - ent-network

  ms-notes:
    build: ./ms-notes
    container_name: ms-notes
    ports:
      - "8008:8008"
    env_file:
      - ./ms-notes/.env
    depends_on:
      - mysql
      - ms-auth
    networks:
      - ent-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../FRONTEND:/usr/share/nginx/html:ro
    depends_on:
      - ms-auth
      - ms-admin
      - ms-messaging
      - ms-upload
      - ms-download
      - ms-calendar
      - ms-notes
    networks:
      - ent-network

networks:
  ent-network:
    driver: bridge

volumes:
  keycloak_data:
  mysql_data:
  cassandra_data:
  minio_data:
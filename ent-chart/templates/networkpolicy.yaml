# ============================================================
#  NetworkPolicies — Isolation réseau inter-services
#  Principe : deny-all par défaut, whitelist explicite
# ============================================================

# ── Politique par défaut : bloquer tout trafic entrant ─────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

# ── Autoriser le trafic depuis l'Ingress Controller ────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: {{ include "ent.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

---
# ── Microservices : autoriser trafic depuis frontend + autres MS ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-microservices-ingress
  namespace: {{ include "ent.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: microservice
  policyTypes:
    - Ingress
  ingress:
    # Depuis l'Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Depuis le même namespace (appels inter-services)
    - from:
        - podSelector: {}

# ── Keycloak : accessible depuis tous les microservices ────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-ingress
  namespace: {{ include "ent.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

# ── MySQL : accessible uniquement depuis MS qui en ont besoin ─
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mysql-ingress
  namespace: {{ include "ent.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - keycloak
                  - ms-calendar
                  - ms-notes
                  - ms-admin
                  - ms-messaging
      ports:
        - port: 3306

# ── Cassandra : accessible depuis MS upload/download/admin/messaging ─
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cassandra-ingress
  namespace: {{ include "ent.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cassandra
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ms-upload
                  - ms-download
                  - ms-admin
                  - ms-messaging
      ports:
        - port: 9042

# ── RabbitMQ : accessible depuis MS notes et messaging ─────

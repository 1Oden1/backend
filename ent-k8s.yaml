# ════════════════════════════════════════════════════════════════
#  MS-CALENDAR
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-calendar
  namespace: ent-sale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ms-calendar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ms-calendar
    spec:
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z ent-mysql 3306; do echo waiting mysql...; sleep 3; done"]
      containers:
        - name: ms-calendar
          image: ent/ms-calendar:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MYSQL_DB_CALENDAR
            - name: KEYCLOAK_URL
              valueFrom:

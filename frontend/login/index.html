      <rect x="150" y="295" width="70" height="18" rx="3" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
      <rect x="240" y="295" width="70" height="18" rx="3" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
      <rect x="330" y="295" width="70" height="18" rx="3" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
      <rect x="420" y="295" width="60" height="18" rx="3" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1"/>
      <!-- Rangée 3 -->
      <rect x="60" y="340" width="70" height="18" rx="3" fill="#0f2d4a" stroke="#1e4a7a" stroke-width="1" opacity=".6"/>

  <!-- ── FORMULAIRE ── -->
  <main class="form-panel">
    <div class="card">
      <div class="card-top-bar"></div>

      <div class="card-header">
        <span class="card-tag">Authentification</span>
        <h2>Connexion<br/>à l'ENT</h2>
        <p>Utilisez vos identifiants universitaires Keycloak.</p>
      </div>

      <div class="field">
        <label for="username">Identifiant</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="username" placeholder="Votre identifiant" autocomplete="username"/>
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="eye-btn" id="eyeBtn" type="button" title="Afficher/masquer">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
      </div>

      <button class="btn-login" id="loginBtn" type="button">
        <span id="btnLabel">Se connecter</span>
      </button>

      <div class="error-msg" id="errorBox" role="alert">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText"></span>
      </div>

      <div class="info-divider"><span>Accès</span></div>
      <div class="info-box">
        Vos droits (<strong>étudiant</strong>, <strong>enseignant</strong>, <strong>admin</strong>) sont détectés automatiquement via Keycloak.
      </div>
    </div>
  </main>

</div>

  <script>
/* ═══════════════════════════════════════════════════
   ENT Salé — Login · app.js
═══════════════════════════════════════════════════ */

'use strict';

// ── Éléments DOM ────────────────────────────────────────────────────────────
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const loginBtn      = document.getElementById('loginBtn');
const btnLabel      = document.getElementById('btnLabel');
const eyeBtn        = document.getElementById('eyeBtn');
const eyeIcon       = document.getElementById('eyeIcon');
const errorBox      = document.getElementById('errorBox');
const errorText     = document.getElementById('errorText');

// ── Auto-redirect si déjà connecté (token valide uniquement) ─────────────────
(function checkExistingSession() {
  const token     = localStorage.getItem('access_token');
  const user      = localStorage.getItem('user');
  const ts        = parseInt(localStorage.getItem('token_ts') || '0');
  const expiresIn = parseInt(localStorage.getItem('expires_in') || '0');
  if (!token || !user) return;

  // Si le token est clairement expiré, nettoyer et rester sur login
  const elapsed = (Date.now() - ts) / 1000;
  if (expiresIn > 0 && elapsed > expiresIn) {
    localStorage.clear();
    return;
  }

  try {
    const u     = JSON.parse(user);
    // Keycloak peut retourner les rôles sous différents noms
    const roles = u.roles || u.realm_roles || u.groups || [];
    if (roles.length > 0) redirect(roles);
  } catch { localStorage.clear(); }
})();

// ── Toggle affichage mot de passe ────────────────────────────────────────────
eyeBtn.addEventListener('click', () => {
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>'
      + '<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
      + '<line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    passwordInput.type = 'password';
    eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// ── Clic sur le bouton ───────────────────────────────────────────────────────
loginBtn.addEventListener('click', doLogin);

// ── Touche Entrée ────────────────────────────────────────────────────────────
[usernameInput, passwordInput].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
);

// ── Fonction principale de connexion ─────────────────────────────────────────
async function doLogin() {
  const username = usernameInput.value.trim();
  const password = passwordInput.value;

  if (!username || !password) {
    showError('Veuillez remplir tous les champs.');
    return;
  }

  setLoading(true);
  hideError();

  try {
    // 1) Login → tokens
    const loginRes = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password }),
    });

    if (!loginRes.ok) {
      const data = await loginRes.json().catch(() => ({}));
      showError(data.detail || 'Identifiants incorrects. Veuillez réessayer.');
      setLoading(false);
      return;
    }

    const tokens = await loginRes.json();
    saveTokens(tokens);

    // 2) /auth/me → rôles
    const meRes = await fetch('/api/auth/me', {
      headers: { Authorization: `Bearer ${tokens.access_token}` },
    });

    if (!meRes.ok) {
      showError('Erreur lors de la récupération du profil utilisateur.');
      setLoading(false);
      return;
    }

    const user = await meRes.json();
    localStorage.setItem('user', JSON.stringify(user));

    // 3) Succès visuel puis redirection
    setSuccess();
    setTimeout(() => redirect(user.roles || []), 750);

  } catch {
    showError('Impossible de joindre le serveur. Vérifiez votre connexion réseau.');
    setLoading(false);
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function saveTokens(tokens) {
  localStorage.setItem('access_token',  tokens.access_token);
  localStorage.setItem('refresh_token', tokens.refresh_token);
  localStorage.setItem('expires_in',    String(tokens.expires_in));
  localStorage.setItem('token_ts',      String(Date.now()));
}

function redirect(roles) {
  if (roles.includes('admin'))            window.location.href = '/admin/';
  else if (roles.includes('enseignant'))  window.location.href = '/enseignant/';
  else                                    window.location.href = '/etudiant/';
}

function setLoading(on) {
  loginBtn.disabled = on;
  if (on) {
    btnLabel.innerHTML = '<span class="spinner"></span>Connexion…';
  } else {
    btnLabel.textContent = 'Se connecter';
    loginBtn.classList.remove('success');
    loginBtn.style.cssText = '';
  }
}

function setSuccess() {
  loginBtn.classList.add('success');
  btnLabel.textContent = '✓ Connexion réussie';
}

function showError(msg) {
  errorText.textContent = msg;
  errorBox.classList.add('show');
}

function hideError() {
  errorBox.classList.remove('show');
}

</script>
</body>
</html>

# ================================================================
#  ENT Salé — Déploiement Kubernetes complet
#  Un seul fichier, kubectl apply -f ent-k8s.yaml
#
#  AVANT d'appliquer : remplace les mots de passe
#  Cherche "CHANGE_ME" dans ce fichier et remplace par tes valeurs
# ================================================================

# ════════════════════════════════════════════════════════════════
#  NAMESPACE
# ════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: ent-sale

---
# ════════════════════════════════════════════════════════════════
#  SECRETS — mots de passe centralisés
#  Remplace toutes les valeurs CHANGE_ME_*
# ════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: ent-credentials
  namespace: ent-sale
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "CHANGE_ME_MYSQL_ROOT"
  MYSQL_USER: "ent_user"
  MYSQL_PASSWORD: "CHANGE_ME_MYSQL_PASS"
  KEYCLOAK_ADMIN_USER: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "CHANGE_ME_KC_ADMIN"
  KEYCLOAK_CLIENT_SECRET: "CHANGE_ME_KC_SECRET"
  MINIO_ACCESS_KEY: "CHANGE_ME_MINIO_KEY"
  MINIO_SECRET_KEY: "CHANGE_ME_MINIO_SECRET"
  RABBITMQ_USER: "ent_user"
  RABBITMQ_PASSWORD: "CHANGE_ME_RABBIT_PASS"
  INTERNAL_TOKEN: "CHANGE_ME_INTERNAL_TOKEN"

---
# ════════════════════════════════════════════════════════════════
#  CONFIGMAP — configuration non-sensible
# ════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: ent-config
  namespace: ent-sale
data:
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "ent-sale"
  KEYCLOAK_CLIENT_ID: "ent-backend"
  JWT_ALGORITHM: "RS256"
  MYSQL_HOST: "ent-mysql"
  MYSQL_PORT: "3306"
  MYSQL_DB_CALENDAR: "ent_calendar"
  MYSQL_DB_NOTES: "ent_notes"
  CASSANDRA_HOST: "ent-cassandra"
  CASSANDRA_HOSTS: '["ent-cassandra"]'
  CASSANDRA_DC: "datacenter1"
  CASSANDRA_KEYSPACE_FILES: "ent_files"
  CASSANDRA_KEYSPACE_MESSAGING: "ent_messaging"
  MINIO_ENDPOINT: "ent-minio:9000"
  MINIO_BUCKET: "ent-courses"
  MINIO_SECURE: "false"
  RABBITMQ_EXCHANGE: "ent.events"
  RABBITMQ_QUEUE: "ms_messaging_queue"
  MS_CALENDAR_URL: "http://ms-calendar:8000"
  MS_NOTES_URL: "http://ms-notes:8000"
  MS_MESSAGING_URL: "http://ms-messaging:8000"
  MS_UPLOAD_URL: "http://ms-upload:8000"
  MS_DOWNLOAD_URL: "http://ms-download:8000"
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3"
  MAX_FILE_SIZE_MB: "50"

---
# Script SQL init MySQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: ent-sale
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS keycloak CHARACTER SET utf8mb4;
    CREATE DATABASE IF NOT EXISTS ent_calendar CHARACTER SET utf8mb4;
    CREATE DATABASE IF NOT EXISTS ent_notes CHARACTER SET utf8mb4;
    GRANT ALL PRIVILEGES ON keycloak.* TO 'ent_user'@'%';
    GRANT ALL PRIVILEGES ON ent_calendar.* TO 'ent_user'@'%';
    GRANT ALL PRIVILEGES ON ent_notes.* TO 'ent_user'@'%';
    FLUSH PRIVILEGES;

---
# ════════════════════════════════════════════════════════════════
#  MYSQL
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ent-mysql
  namespace: ent-sale
spec:
  serviceName: ent-mysql
  replicas: 1
  selector:
    matchLabels:
      app: ent-mysql
  template:
    metadata:
      labels:
        app: ent-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              value: "keycloak"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: init-script
          configMap:
            name: mysql-init
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ent-mysql
  namespace: ent-sale
spec:
  selector:
    app: ent-mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None

---
# ════════════════════════════════════════════════════════════════
#  CASSANDRA
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ent-cassandra
  namespace: ent-sale
spec:
  serviceName: ent-cassandra
  replicas: 1
  selector:
    matchLabels:
      app: ent-cassandra
  template:
    metadata:
      labels:
        app: ent-cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "ENTCluster"
            - name: CASSANDRA_DC
              value: "datacenter1"
            - name: CASSANDRA_RACK
              value: "rack1"
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: "GossipingPropertyFileSnitch"
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "128M"
          readinessProbe:
            exec:
              command: ["cqlsh", "-e", "describe keyspaces"]
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 15
          livenessProbe:
            exec:
              command: ["cqlsh", "-e", "describe keyspaces"]
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ent-cassandra
  namespace: ent-sale
spec:
  selector:
    app: ent-cassandra
  ports:
    - port: 9042
      targetPort: 9042
  clusterIP: None

---
# ════════════════════════════════════════════════════════════════
#  RABBITMQ
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ent-rabbitmq
  namespace: ent-sale
spec:
  serviceName: ent-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: ent-rabbitmq
  template:
    metadata:
      labels:
        app: ent-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: RABBITMQ_PASSWORD
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ent-rabbitmq
  namespace: ent-sale
spec:
  selector:
    app: ent-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
# ════════════════════════════════════════════════════════════════
#  MINIO
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ent-minio
  namespace: ent-sale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ent-minio
  template:
    metadata:
      labels:
        app: ent-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: ent-sale
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ent-minio
  namespace: ent-sale
spec:
  selector:
    app: ent-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

---
# ════════════════════════════════════════════════════════════════
#  KEYCLOAK
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: ent-sale
spec:
  serviceName: keycloak
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "until nc -z ent-mysql 3306; do echo waiting for mysql...; sleep 3; done"
      containers:
        - name: keycloak
          image: keycloak/keycloak:25.0
          imagePullPolicy: IfNotPresent
          command: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: "mysql"
            - name: KC_DB_URL
              value: "jdbc:mysql://ent-mysql:3306/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: MYSQL_PASSWORD
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 1536Mi
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
            optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ent-sale
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080

---
# ════════════════════════════════════════════════════════════════
#  MS-AUTH
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-auth
  namespace: ent-sale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ms-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ms-auth
    spec:
      containers:
        - name: ms-auth
          image: ent/ms-auth:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ent-credentials
                  key: KEYCLOAK_CLIENT_SECRET
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: JWT_ALGORITHM
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: ms-auth
  namespace: ent-sale
spec:
  selector:
    app.kubernetes.io/name: ms-auth
  ports:
    - port: 8000
      targetPort: 8000

---

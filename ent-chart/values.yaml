# ============================================================
#  ENT Salé — values.yaml
#  Modifie ce fichier pour adapter au déploiement cible.
# ============================================================

global:
  namespace: ent-sale
  imageRegistry: ""           # ex: registry.est-sale.ma/ — laisser vide si images locales
  imagePullPolicy: IfNotPresent
  # Domaine principal pour l'Ingress
  domain: ent.est-sale.ma
  # TLS : mettre true + créer le secret manuellement, ou utiliser cert-manager
  tls:
    enabled: false
    secretName: ent-tls-secret

# ============================================================
#  SECRETS GLOBAUX (injectés dans tous les services)
# ============================================================
secrets:
  mysql:
    rootPassword: "root_password"
    user: "ent_user"
    password: "ent_password"
  keycloak:
    adminUser: "admin"
    adminPassword: "admin_password"
    clientSecret: "change-me-in-prod"
  minio:
    accessKey: "ent_user"
    secretKey: "ent_password"
  rabbitmq:
    user: "ent_user"
    password: "ent_password"
  internalServiceToken: "change-internal-token-prod"

# ============================================================
#  INFRASTRUCTURE — Bitnami sub-charts
# ============================================================
mysql:
  enabled: true
  auth:
    rootPassword: "root_password"
    username: "ent_user"
    password: "ent_password"
    database: "keycloak"
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  initdbScriptsConfigMap: "mysql-init-scripts"

cassandra:
  enabled: true
  cluster:
    name: "ENTCluster"
    datacenter: "datacenter1"
    replicaCount: 1
  dbUser:
    user: "ent_user"
    password: "ent_password"
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

rabbitmq:
  enabled: true
  auth:
    username: "ent_user"
    password: "ent_password"
  persistence:
    enabled: true
    size: 4Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

minio:
  enabled: true
  auth:
    rootUser: "ent_user"
    rootPassword: "ent_password"
  defaultBuckets: "ent-courses"
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ============================================================
#  KEYCLOAK (déployé via template custom)
# ============================================================
keycloak:
  enabled: true
  image: "keycloak/keycloak:25.0"
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 1500m
      memory: 1536Mi
  persistence:
    realmConfigMap: "keycloak-realm-config"

# ============================================================
#  OLLAMA (IA — GPU optionnel)
# ============================================================
ollama:
  enabled: true
  image: "ollama/ollama:latest"
  replicaCount: 1
  model: "llama3:latest"
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  # Décommenter si node GPU disponible :
  # gpu:
  #   enabled: true
  #   count: 1
  persistence:
    enabled: true
    size: 20Gi

# ============================================================
#  MICROSERVICES — configuration commune + par service
# ============================================================
microservices:

  # Valeurs communes héritées par tous les microservices
  defaults:
    port: 8000
    replicaCount: 2
    image:
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    livenessProbe:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 15
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10

  # --- ms-auth (8001) ---
  msAuth:
    name: ms-auth
    image: "ent/ms-auth:latest"
    servicePort: 8001
    hpa:
      maxReplicas: 6

  # --- ms-upload (8002) ---
  msUpload:
    name: ms-upload
    image: "ent/ms-upload:latest"
    servicePort: 8002
    hpa:
      maxReplicas: 6

  # --- ms-download (8003) ---
  msDownload:
    name: ms-download
    image: "ent/ms-download:latest"
    servicePort: 8003
    hpa:
      maxReplicas: 10  # fort trafic attendu

  # --- ms-calendar (8004) ---
  msCalendar:
    name: ms-calendar
    image: "ent/ms-calendar:latest"
    servicePort: 8004

  # --- ms-notes (8005) ---
  msNotes:
    name: ms-notes
    image: "ent/ms-notes:latest"
    servicePort: 8005

  # --- ms-admin (8006) ---
  msAdmin:
    name: ms-admin
    image: "ent/ms-admin:latest"
    servicePort: 8006
    hpa:
      minReplicas: 1
      maxReplicas: 3

  # --- ms-messaging (8007) ---
  msMessaging:
    name: ms-messaging
    image: "ent/ms-messaging:latest"
    servicePort: 8007
    hpa:
      maxReplicas: 8

  # --- ms-ia (8008) ---
  msIa:
    name: ms-ia
    image: "ent/ms-ia:latest"
    servicePort: 8008
    hpa:
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 80  # IA = CPU-intensive

# ============================================================
#  FRONTEND (Nginx)
# ============================================================
frontend:
  enabled: true
  image: "ent/frontend:latest"
  replicaCount: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60

# ============================================================
#  INGRESS
# ============================================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # Rate limiting (protection DDoS)
    nginx.ingress.kubernetes.io/limit-rps: "50"

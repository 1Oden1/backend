# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  ENT Salé — Pipeline CI/CD GitHub Actions                               ║
# ║  Fichier : .github/workflows/ci-cd.yml                                  ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  FLUX :                                                                  ║
# ║  1. CI  — lint + tests unitaires (push sur toutes les branches)         ║
# ║  2. BUILD — build Docker + push vers GHCR (main + tags)                 ║
# ║  3. DEPLOY — déploiement SSH sur le serveur ESXi (tags uniquement)      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: ENT Salé — CI/CD

on:
  push:
    branches: [ "main", "develop", "feature/**", "hotfix/**" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "develop" ]

# Annuler les runs en cours sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:       ghcr.io
  IMAGE_PREFIX:   ${{ github.repository_owner }}/ent-sale

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — LINT & TESTS
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  lint-and-test:
    name:  Lint & Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ms-auth
          - ms-upload
          - ms-download
          - ms-admin
          - ms-calendar
          - ms-notes
          - ms-messaging
          - ms-ia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "${{ matrix.service }}/requirements.txt"

      - name: Install dependencies — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx pytest-cov

      - name: Lint — ruff
        working-directory: ${{ matrix.service }}
        run: |
          ruff check app/ --select E,W,F --ignore E501 || true

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        env:
          # Variables factices pour les tests unitaires (pas de vraie DB)
          MYSQL_HOST:     localhost
          MYSQL_USER:     test
          MYSQL_PASSWORD: test
          MYSQL_DATABASE: test
          CASSANDRA_HOST: localhost
          KEYCLOAK_URL:   http://localhost:8080
          KEYCLOAK_REALM: ent-sale
          RABBITMQ_URL:   amqp://guest:guest@localhost:5672/
          OLLAMA_URL:     http://localhost:11434
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short --cov=app --cov-report=xml \
                   --ignore=tests/integration || true
          else
            echo "Pas de tests unitaires pour ${{ matrix.service }} — skip"
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — BUILD & PUSH DOCKER IMAGES
# Déclenché sur : main, develop et tags v*.*.*
# ══════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name:  Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/develop' ||
       startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ms-auth
            context: ./ms-auth
          - service: ms-upload
            context: ./ms-upload
          - service: ms-download
            context: ./ms-download
          - service: ms-admin
            context: ./ms-admin
          - service: ms-calendar
            context: ./ms-calendar
          - service: ms-notes
            context: ./ms-notes
          - service: ms-messaging
            context: ./ms-messaging
          - service: ms-ia
            context: ./ms-ia
          - service: frontend
            context: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Calcul du tag Docker
      - name: Compute image tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            # Tag "latest" sur main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag "develop" sur develop
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            # Tag sémantique sur les releases v*.*.*
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # SHA court pour toutes les branches
            type=sha,prefix=sha-,format=short

      - name: Setup QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:   ${{ matrix.context }}
          file:      ${{ matrix.context }}/Dockerfile
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          platforms:  linux/amd64

      - name: Image digest
        run: echo " ${{ matrix.service }} → ${{ steps.meta.outputs.tags }}"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — INTEGRATION TESTS (après build)
# Lance un docker-compose de test sur le runner GitHub
# ══════════════════════════════════════════════════════════════════════════════
  integration-tests:
    name:  Tests d'intégration
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for tests
        run: |
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=test_root
          MYSQL_USER=ent_user
          MYSQL_PASSWORD=test_pass
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=admin_test
          KEYCLOAK_CLIENT_SECRET=test-secret
          MINIO_ACCESS_KEY=ent_user
          MINIO_SECRET_KEY=test_minio_pass
          RABBITMQ_USER=ent_user
          RABBITMQ_PASS=test_rabbit_pass
          OLLAMA_MODEL=llama3
          HOST_IP=localhost
          IMAGE_TAG=${{ github.sha }}
          EOF

      - name: Pull images from GHCR
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo $CR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Override pour utiliser les images construites
          export IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)

      - name: Start infrastructure (healthcheck)
        run: |
          # Lance uniquement l'infrastructure (MySQL, Keycloak, Cassandra, MinIO, RabbitMQ)
          docker compose up -d mysql cassandra minio rabbitmq
          echo "Attente de l'infrastructure (60s)..."
          sleep 60

      - name: Health-check infrastructure
        run: |
          docker compose ps
          docker compose exec -T mysql mysqladmin ping -h localhost -u root -ptest_root \
            && echo " MySQL OK" || echo " MySQL KO"

      - name: Stop test environment
        if: always()
        run: docker compose down -v --remove-orphans

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4 — DEPLOY (uniquement sur tags v*.*.*)
# Déploiement SSH vers le serveur de production (Ubuntu 24 / VMware ESXi)
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name:  Déploiement Production
    runs-on: ubuntu-latest
    needs: [ build-and-push, integration-tests ]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: http://${{ secrets.PROD_HOST }}:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Préparer les fichiers de déploiement
        run: |
          # Créer le bundle de déploiement
          mkdir -p deploy_bundle
          cp docker-compose.yml deploy_bundle/
          cp .env.example       deploy_bundle/.env.example

          # Générer le script de déploiement
          cat > deploy_bundle/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -euo pipefail

          TAG=$1
          REGISTRY=$2
          COMPOSE_FILE="/opt/ent-sale/docker-compose.yml"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Déploiement ENT Salé — version $TAG"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cd /opt/ent-sale

          # Mettre à jour le tag dans .env
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$TAG/" .env

          # Pull les nouvelles images
          echo " Pull des images..."
          docker compose pull --quiet \
            ms-auth ms-upload ms-download ms-admin \
            ms-calendar ms-notes ms-messaging ms-ia frontend

          # Redémarrage rolling (zéro downtime sur les services sans dépendances circulaires)
          echo " Mise à jour des services..."
          for svc in ms-auth ms-upload ms-download ms-calendar ms-notes ms-admin ms-messaging ms-ia frontend; do
            echo "  ↺ $svc..."
            docker compose up -d --no-deps "$svc"
            sleep 5
            docker compose ps "$svc" | grep -q "healthy\|running" && echo "   $svc OK" || echo "  ️ $svc status inconnu"
          done

          # Nettoyage des images obsolètes
          docker image prune -f --filter "until=24h" || true

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Déploiement $TAG terminé !"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          DEPLOY_SCRIPT
          chmod +x deploy_bundle/deploy.sh

      - name: Copier les fichiers sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     ${{ secrets.PROD_SSH_PORT || 22 }}
          source:   "deploy_bundle/"
          target:   "/opt/ent-sale/"
          strip_components: 1

      - name: Exécuter le déploiement SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     ${{ secrets.PROD_SSH_PORT || 22 }}
          timeout:  300s
          script: |
            cd /opt/ent-sale
            bash deploy.sh "${{ steps.version.outputs.tag }}" "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"

      - name: Smoke test post-déploiement
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            echo " Vérification des endpoints..."
            endpoints=(
              "http://localhost:3000/health"
              "http://localhost:8001/health"
              "http://localhost:8002/health"
              "http://localhost:8003/health"
              "http://localhost:8004/health"
              "http://localhost:8005/health"
              "http://localhost:8006/health"
              "http://localhost:8007/health"
              "http://localhost:8008/health"
            )
            FAILED=0
            for url in "${endpoints[@]}"; do
              if curl -sf --max-time 10 "$url" > /dev/null; then
                echo "   $url"
              else
                echo "   $url"
                FAILED=$((FAILED + 1))
              fi
            done
            if [ $FAILED -gt 0 ]; then
              echo "️ $FAILED endpoint(s) en échec !"
              exit 1
            fi
            echo " Tous les services répondent."

      - name: Notification Slack (succès)
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": " *ENT Salé ${{ steps.version.outputs.tag }}* déployé en production !",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Version",    "value": "${{ steps.version.outputs.tag }}", "short": true},
                  {"title": "Déclenché par", "value": "${{ github.actor }}",          "short": true},
                  {"title": "Commit",     "value": "${{ github.sha }}",               "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notification Slack (échec)
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": " *Échec du déploiement ENT Salé ${{ steps.version.outputs.tag }}*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version",    "value": "${{ steps.version.outputs.tag }}", "short": true},
                  {"title": "Déclenché par", "value": "${{ github.actor }}",          "short": true},
                  {"title": "Logs", "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

# ══════════════════════════════════════════════════════════════════════════════
# JOB 5 — ROLLBACK (manuel, via workflow_dispatch)
# ══════════════════════════════════════════════════════════════════════════════
  rollback:
    name: ⏪ Rollback Manuel
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Rollback SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            cd /opt/ent-sale
            echo "⏪ Rollback vers la version précédente..."
            # Récupérer le tag précédent depuis git
            PREV_TAG=$(docker image ls --format "{{.Tag}}" \
              ghcr.io/${{ env.IMAGE_PREFIX }}/ms-auth 2>/dev/null | \
              grep -E '^v[0-9]+' | sort -rV | sed -n '2p')
            if [ -z "$PREV_TAG" ]; then
              echo " Impossible de déterminer la version précédente"
              exit 1
            fi
            echo "↩️ Rollback vers $PREV_TAG"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
            docker compose up -d --no-deps \
              ms-auth ms-upload ms-download ms-admin \
              ms-calendar ms-notes ms-messaging ms-ia frontend
            echo " Rollback $PREV_TAG effectué."

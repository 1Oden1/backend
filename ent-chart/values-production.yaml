# ================================================================
#  ENT Salé — values-production.yaml
#  Override pour le déploiement production sur VMware ESXi
#
#  Usage :
#    VALUES_OVERRIDE=./ent-chart/values-production.yaml ./deploy.sh install
#
#  ⚠ IMPORTANT : Remplace TOUS les mots de passe par des valeurs
#    fortes avant de déployer en production !
# ================================================================

global:
  domain: ent.est-sale.ma
  imagePullPolicy: Always
  tls:
    enabled: true
    secretName: ent-tls-secret
    # Créer le secret TLS manuellement :
    # kubectl create secret tls ent-tls-secret \
    #   --cert=cert.pem --key=key.pem -n ent-sale

# ── Secrets production (CHANGER CES VALEURS) ─────────────────
secrets:
  mysql:
    rootPassword: "CHANGE_ME_MYSQL_ROOT"
    user: "ent_user"
    password: "CHANGE_ME_MYSQL_PASS"
  keycloak:
    adminUser: "admin"
    adminPassword: "CHANGE_ME_KC_ADMIN"
    clientSecret: "CHANGE_ME_KC_CLIENT_SECRET"
  minio:
    accessKey: "CHANGE_ME_MINIO_KEY"
    secretKey: "CHANGE_ME_MINIO_SECRET"
  rabbitmq:
    user: "ent_user"
    password: "CHANGE_ME_RABBITMQ_PASS"
  internalServiceToken: "CHANGE_ME_INTERNAL_TOKEN_64CHARS"

# ── MySQL production ──────────────────────────────────────────
mysql:
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

# ── Cassandra production ──────────────────────────────────────
cassandra:
  cluster:
    replicaCount: 3    # 3 nœuds pour la tolérance aux pannes
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

# ── MinIO production ──────────────────────────────────────────
minio:
  persistence:
    size: 100Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi

# ── Keycloak production ───────────────────────────────────────
keycloak:
  replicaCount: 2    # HA Keycloak
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

# ── Microservices — profil production ────────────────────────
microservices:
  defaults:
    replicaCount: 3   # 3 replicas en prod
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    hpa:
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 65

  msDownload:
    name: ms-download
    image: "ent/ms-download:latest"
    servicePort: 8003
    hpa:
      maxReplicas: 20

  msIa:
    name: ms-ia
    image: "ent/ms-ia:latest"
    servicePort: 8008
    hpa:
      minReplicas: 2
      maxReplicas: 6

# ── Frontend production ───────────────────────────────────────
frontend:
  replicaCount: 3
  hpa:
    minReplicas: 3
    maxReplicas: 10

# ── Ollama production (GPU si disponible) ─────────────────────
ollama:
  replicaCount: 1
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 8000m
      memory: 16Gi
  # Décommenter si node GPU disponible :
  # gpu:
  #   enabled: true
  #   count: 1

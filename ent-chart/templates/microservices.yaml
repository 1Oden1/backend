# ==============================================================
#  ms-ia (port 8008)
# ==============================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-ia
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
    app.kubernetes.io/name: ms-ia
    app.kubernetes.io/component: microservice
spec:
  replicas: {{ .Values.microservices.defaults.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ms-ia
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ms-ia
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-ollama
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z ollama 11434; do echo waiting ollama...; sleep 5; done"]
      containers:
        - name: ms-ia
          image: {{ include "ent.image" (dict "global" .Values.global "image" .Values.microservices.msIa.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- include "ent.commonEnv" . | nindent 12 }}
            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: OLLAMA_HOST
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: OLLAMA_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: OLLAMA_MODEL
            - name: MAX_HISTORY_MESSAGES
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MAX_HISTORY_MESSAGES
            - name: MAX_PROMPT_CHARS
              valueFrom:
                configMapKeyRef:
                  name: ent-config
                  key: MAX_PROMPT_CHARS
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.microservices.defaults.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-ia
  namespace: {{ include "ent.namespace" . }}
spec:
  selector:
    app.kubernetes.io/name: ms-ia
  ports:
    - port: 8000
      targetPort: 8000
      name: http

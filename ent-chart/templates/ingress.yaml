{{- if .Values.ingress.enabled }}
# ============================================================
#  Ingress — ENT Salé
#
#  Architecture :
#    Tout le trafic → frontend Nginx
#    Le frontend Nginx proxy_pass vers chaque microservice
#    (comme Docker Compose, juste les noms d'hôtes changent :
#     ent_ms_notes → ms-notes, etc.)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ent-ingress
  namespace: {{ include "ent.namespace" . }}
  labels:
    {{- include "ent.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.global.domain }}
      secretName: {{ .Values.global.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
{{- end }}
